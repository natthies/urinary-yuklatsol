<head>

    :root {

      --primary: #f97316;
      --primary-2: #ea580c;
      --secondary: #0ea5e9;
      --secondary-2: #0284c7;

    }

    body {

    .container {
      max-width: 920px;
      margin: 24px auto;
      background: var(--card);

      border-radius: 24px;
      padding: 28px;
      box-shadow: var(--shadow);

    .home {

    }

      background: linear-gradient(90deg, #f97316, #fb7185);
      color: white;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.3px;
      margin-bottom: 18px;
    }

      line-height: 1.2;
    }

    }

    .subtitle {
      color: var(--muted);
      font-size: 18px;
      margin-bottom: 28px;
    }

    .go-btn,
    .next-btn,
    .restart-btn,
    .back-btn {
      border: none;
      color: white;
      cursor: pointer;
      border-radius: 14px;
      padding: 14px 26px;
      font-size: 18px;
      font-weight: 700;
      transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
    }

    .go-btn {
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      box-shadow: 0 12px 28px rgba(249, 115, 22, 0.35);
    }

    .next-btn,
    .restart-btn {
      background: linear-gradient(135deg, var(--secondary), var(--secondary-2));
      box-shadow: 0 12px 28px rgba(14, 165, 233, 0.28);
    }

    .back-btn {
      background: linear-gradient(135deg, var(--back-1), var(--back-2));
      box-shadow: 0 12px 28px rgba(71, 85, 105, 0.28);
    }

    .go-btn:hover,
    .next-btn:hover,
    .restart-btn:hover,
    .back-btn:hover {
      transform: translateY(-2px);
    }

    .meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
      color: var(--muted);
      font-weight: 700;
    }

    .meta-chip {
      background: linear-gradient(135deg, #fff7ed, #ffedd5);
      border: 1px solid #fdba74;
      padding: 8px 14px;
      border-radius: 999px;
    }

    #question {
      font-size: 24px;
      line-height: 1.45;
      margin-bottom: 18px;
    }

    .options {
      display: grid;
      gap: 12px;
    }

    .options label {
      display: block;
      padding: 16px 18px;
      border: 2px solid #e5e7eb;
      border-radius: 16px;
      cursor: pointer;
      background: white;
      transition: all 0.18s ease;
      font-size: 16px;
      line-height: 1.5;
    }

    .options label:hover {
      border-color: #7dd3fc;
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(14, 165, 233, 0.1);
    }

    .options input {
      margin-right: 10px;
      transform: scale(1.1);
      accent-color: var(--secondary);
    }

    .correct {
      background: var(--success-bg) !important;
      border-color: var(--success-border) !important;
    }

    .wrong {
      background: var(--wrong-bg) !important;
      border-color: var(--wrong-border) !important;
    }

    .explain {
      margin-top: 18px;
      padding: 16px 18px;
      border-radius: 16px;
      background: var(--explain-bg);
      border-left: 6px solid #f59e0b;
      line-height: 1.6;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .result {
      text-align: center;
      padding: 80px 24px;
    }

    .result-box {
      background: linear-gradient(135deg, #eff6ff, #fdf2f8);
      border: 1px solid #c4b5fd;
      border-radius: 22px;
      padding: 28px;
      max-width: 520px;
      margin: 0 auto;
    }

      font-size: 44px;
      font-weight: 800;
      margin: 14px 0;
      color: #7c3aed;
    }

      }

      #question {
        font-size: 20px;
      }

      .go-btn,
      .next-btn,
      .restart-btn,
      .back-btn {
        width: 100%;
      }
    }
  </style>
</head>

    let current = 0;
    let currentOptions = [];
    let score = 0;
    let answered = false;
    let timeLeft = 80 * 60;
    let timerInterval = null;

    const homeEl = document.getElementById("home");
    const quizEl = document.getElementById("quizContainer");
    const metaEl = document.getElementById("meta");
    const scoreInfoEl = document.getElementById("scoreInfo");
    const timerInfoEl = document.getElementById("timerInfo");
    const questionEl = document.getElementById("question");
    const optionsEl = document.getElementById("options");
    const explainEl = document.getElementById("explain");
    const startBtn = document.getElementById("startBtn");
    const nextBtn = document.getElementById("nextBtn");
    const backBtn = document.getElementById("backBtn");

    const userAnswers = Array(questions.length).fill(null);

    startBtn.addEventListener("click", startQuiz);
    nextBtn.addEventListener("click", nextQuestion);
    backBtn.addEventListener("click", prevQuestion);

    function startQuiz() {
      homeEl.style.display = "none";
      quizEl.style.display = "block";
      current = 0;
      score = 0;
      answered = false;
      timeLeft = 80 * 60;
      userAnswers.fill(null);
      startTimer();
      loadQuestion();
    }

    function startTimer() {
      clearInterval(timerInterval);
      updateTimerDisplay();

      timerInterval = setInterval(() => {
        timeLeft--;
        updateTimerDisplay();

        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          finishQuiz();
        }
      }, 1000);
    }

    function updateTimerDisplay() {
      const minutes = String(Math.floor(timeLeft / 60)).padStart(2, "0");
      const seconds = String(timeLeft % 60).padStart(2, "0");
      timerInfoEl.innerText = "Timer: " + minutes + ":" + seconds;
    }

    function shuffleArray(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
    }

    function recalculateScore() {
      score = userAnswers.reduce((total, answer, index) => {
        return total + (answer === questions[index].answer ? 1 : 0);
      }, 0);

      scoreInfoEl.innerText = "Score: " + score;
    }

    function cleanOptionText(text) {
      return text.replace(/^[a-e]\.\s*/i, "");
    }

    function loadQuestion() {
      answered = userAnswers[current] !== null;
      explainEl.style.display = "none";
      explainEl.innerText = "";

      const q = questions[current];
      metaEl.innerText = "Soal " + (current + 1) + " / " + questions.length;
      questionEl.innerText = q.q;

      currentOptions = q.options.map((opt, i) => ({
        text: opt,
        isCorrect: i === q.answer,
        originalIndex: i
      }));

      shuffleArray(currentOptions);

      optionsEl.innerHTML = currentOptions.map((opt, i) => `
        <label>
          <input type="radio" name="opt" data-index="${i}">
          ${String.fromCharCode(65 + i)}. ${cleanOptionText(opt.text)}
        </label>
      `).join("");

      const radios = optionsEl.querySelectorAll('input[name="opt"]');
      const labels = optionsEl.querySelectorAll("label");
      const savedAnswer = userAnswers[current];

      radios.forEach((radio) => {
        radio.addEventListener("change", function () {
          check(parseInt(this.dataset.index, 10));
        });
      });

      if (savedAnswer !== null) {
        const selectedIndex = currentOptions.findIndex(
          (opt) => opt.originalIndex === savedAnswer
        );

        if (selectedIndex !== -1) {
          radios[selectedIndex].checked = true;

          labels.forEach((label, index) => {
            const input = label.querySelector("input");
            input.disabled = true;

            if (currentOptions[index].isCorrect) {
              label.classList.add("correct");
            }

            if (index === selectedIndex && !currentOptions[index].isCorrect) {
              label.classList.add("wrong");
            }
          });

          explainEl.style.display = "block";
          explainEl.innerText = "Penjelasan: " + questions[current].explain;
        }
      }

      backBtn.disabled = current === 0;
      backBtn.style.opacity = current === 0 ? "0.6" : "1";

      recalculateScore();
    }

    function check(i) {
      const labels = optionsEl.querySelectorAll("label");
      const chosenOriginalIndex = currentOptions[i].originalIndex;

      const previousAnswer = userAnswers[current];
      userAnswers[current] = chosenOriginalIndex;
      answered = true;

      labels.forEach((label) => {
        label.classList.remove("correct", "wrong");
      });

      labels.forEach((label, index) => {
        const input = label.querySelector("input");
        input.disabled = true;

        if (currentOptions[index].isCorrect) {
          label.classList.add("correct");
        }

        if (index === i && !currentOptions[index].isCorrect) {
          label.classList.add("wrong");
        }
      });

      if (previousAnswer === null || previousAnswer !== chosenOriginalIndex) {
        recalculateScore();
      }

      explainEl.style.display = "block";
      explainEl.innerText = "Penjelasan: " + questions[current].explain;
    }

    function prevQuestion() {
      if (current > 0) {
        current--;
        loadQuestion();
      }
    }

    function nextQuestion() {
      if (!answered) return;

      current++;

      if (current < questions.length) {
        loadQuestion();
      } else {
        finishQuiz();
      }
    }

    function finishQuiz() {
      clearInterval(timerInterval);
      recalculateScore();

      document.body.innerHTML = `
        <div class="container result">
          <div class="result-box">
            <div class="badge">Quiz Selesai</div>
            <h2>Hasil Akhir</h2>
            <div class="score-number">${score}/${questions.length}</div>
            <p>Semoga CBT juga lancar ya! Exc33ding A!</p>
            <button class="restart-btn" type="button" onclick="location.reload()">Restart</button>
          </div>
        </div>
      `;
    }
  </script>
